# Lefthook configuration
# Replaces Husky with enhanced git hooks

# Pre-commit: format + lint staged files only
pre-commit:
  commands:
    lint-staged:
      run: bunx --bun lint-staged
      stage_fixed: true

# Commit message validation: enforce conventional commits format
# Note: commit message generation is handled by Claude Code directly,
# not via an external API call — so no prepare-commit-msg hook needed.
commit-msg:
  commands:
    commitlint:
      run: bunx --bun commitlint --edit {1}
      fail_text: "Commit message must follow conventional commits (feat:, fix:, chore:, etc.)"

# Pre-push: fast checks only — full build runs in CI, not locally
pre-push:
  commands:
    lint:
      run: bun run lint
      fail_text: "Linting failed. Fix errors before pushing."
    type-check:
      run: bun run type-check
      fail_text: "Type errors found. Fix before pushing."
